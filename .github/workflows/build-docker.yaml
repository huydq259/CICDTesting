name: Docker Build And Puplish image to official Docker Hub
on:
    [workflow_dispatch]

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Build the Docker image
              run: docker build . -t hq259/demo-1:latest

            # - name: Login to Docker Hub
            #   uses: docker/login-action@v1

            - name: Push the Docker image
              run: docker push hq259/demo-1:latest
              


            
